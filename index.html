<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camera to Telegram</title>
<style>
body{font-family:Arial;text-align:center;margin:30px;}
button{padding:12px 20px;margin:15px;border-radius:8px;border:none;background:#007bff;color:white;font-size:16px;cursor:pointer;}
button:hover{background:#0056b3;}
video{display:none;}
canvas{display:none;}
#toast{
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background:#333;
  color:white;
  padding:12px 25px;
  border-radius:8px;
  opacity:0;
  transition:opacity 0.5s;
}
</style>
</head>
<body>

<h2>Send Photo to Telegram</h2>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<input type="text" id="uid" placeholder="Enter User ID" style="padding:10px;width:200px;">
<br>
<button id="sendBtn">Take Photo & Send</button>

<div id="toast"></div>

<script type="module" src="script.js"></script>
</body>
</html>
