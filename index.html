<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professional Camera Capture</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
body{
  font-family:'Poppins',sans-serif;
  margin:0;
  padding:0;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background: linear-gradient(135deg,#f5f7fa,#c3cfe2);
}
.container{
  background:white;
  padding:30px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
  width: 360px;
  text-align:center;
}
h2{color:#007BFF;margin-bottom:20px;}
video{border-radius:10px;width:100%;margin-bottom:15px;}
input{
  padding:10px;
  width:80%;
  margin-bottom:10px;
  border-radius:8px;
  border:2px solid #007BFF;
  outline:none;
  font-size:16px;
}
#toast{
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  background:#333;color:white;
  padding:12px 25px;
  border-radius:8px;
  opacity:0;
  transition:opacity 0.5s;
}
</style>
</head>
<body>
<div class="container">
  <h2>Professional Camera Capture</h2>
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas" style="display:none;"></canvas>
  <input type="text" id="uid" placeholder="Enter User ID">
  <p>Page will auto-capture every 3 seconds after permission ✅</p>
</div>
<div id="toast"></div>
<script type="module" src="script.js"></script>
</body>
</html>
